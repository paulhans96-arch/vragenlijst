<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vragenlijst — Fysiotherapie</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #f0f4ff 0%, #e8f5e9 100%);
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 24px 16px;
      font-family: Georgia, serif;
    }
    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 32px rgba(0,0,0,0.10);
      width: 100%;
      max-width: 640px;
      overflow: hidden;
    }
    .header {
      background: #1a56db;
      padding: 20px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .logo {
      background: white;
      color: #1a56db;
      font-weight: bold;
      font-size: 18px;
      border-radius: 8px;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: monospace;
    }
    .header h1 { color: white; font-size: 20px; }
    .header p { color: rgba(255,255,255,0.75); font-size: 13px; }
    .progress {
      display: flex;
      gap: 4px;
      padding: 16px 24px 4px;
    }
    .progress-stap {
      flex: 1;
      height: 4px;
      border-radius: 2px;
      background: #e5e7eb;
      transition: background 0.3s;
    }
    .progress-stap.actief { background: #1a56db; }
    .content { padding: 24px; }
    h2 { font-size: 22px; color: #111827; margin-bottom: 8px; }
    .info { color: #6b7280; font-size: 14px; margin-bottom: 20px; line-height: 1.5; }
    label {
      display: block;
      font-weight: bold;
      color: #374151;
      font-size: 15px;
      margin-bottom: 10px;
      margin-top: 20px;
    }
    .knoppen { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 8px; }
    .optie-knop {
      padding: 10px 20px;
      border: 2px solid #e5e7eb;
      border-radius: 8px;
      background: white;
      cursor: pointer;
      font-size: 15px;
      color: #374151;
      font-family: inherit;
      transition: all 0.15s;
    }
    .optie-knop.actief {
      border-color: #1a56db;
      background: #eff6ff;
      color: #1a56db;
      font-weight: bold;
    }
    select {
      width: 100%;
      padding: 10px 14px;
      border: 2px solid #e5e7eb;
      border-radius: 8px;
      font-size: 15px;
      color: #374151;
      background: white;
      margin-bottom: 8px;
      font-family: inherit;
      cursor: pointer;
    }
    .sectie { margin-bottom: 24px; }
    .sectie-header {
      font-size: 16px;
      font-weight: bold;
      color: #1a56db;
      margin-bottom: 6px;
      border-bottom: 2px solid #eff6ff;
      padding-bottom: 6px;
    }
    .sectie-info { color: #6b7280; font-size: 13px; margin-bottom: 16px; }
    .vraag-blok {
      margin-bottom: 16px;
      padding: 12px;
      background: #f9fafb;
      border-radius: 8px;
    }
    .vraag-label { font-size: 14px; color: #374151; margin-bottom: 10px; font-weight: 500; }
    .slider-rij { display: flex; align-items: center; gap: 10px; }
    .slider-min, .slider-max { font-size: 13px; color: #9ca3af; min-width: 20px; text-align: center; }
    input[type="range"] { flex: 1; cursor: pointer; accent-color: #1a56db; }
    .slider-waarde {
      min-width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 14px;
      background: #e5e7eb;
      color: #9ca3af;
      transition: all 0.2s;
    }
    .slider-waarde.ingevuld { background: #1a56db; color: white; }
    .radio-blok {
      margin-bottom: 16px;
      padding: 14px;
      background: #f9fafb;
      border-radius: 8px;
    }
    .radio-label { font-size: 14px; color: #374151; margin-bottom: 10px; font-weight: 500; line-height: 1.4; }
    .radio-nummer { color: #1a56db; font-weight: bold; }
    .radio-opties { display: flex; flex-wrap: wrap; gap: 6px; }
    .radio-knop {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 8px 10px;
      border: 2px solid #e5e7eb;
      border-radius: 8px;
      background: white;
      cursor: pointer;
      font-size: 12px;
      color: #6b7280;
      min-width: 80px;
      flex: 1;
      font-family: inherit;
      transition: all 0.15s;
    }
    .radio-knop.actief { border-color: #1a56db; background: #eff6ff; color: #1a56db; }
    .radio-score { font-weight: bold; font-size: 18px; margin-bottom: 2px; }
    .radio-tekst { text-align: center; line-height: 1.2; }
    .samenvatting {
      background: #f9fafb;
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 16px;
    }
    .samenvatting-rij {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #e5e7eb;
      font-size: 15px;
    }
    .samenvatting-label { color: #6b7280; }
    .samenvatting-waarde { font-weight: bold; color: #111827; }
    .navigatie {
      display: flex;
      align-items: center;
      padding: 16px 24px;
      border-top: 1px solid #f3f4f6;
      gap: 12px;
    }
    .terug-knop {
      padding: 10px 20px;
      border: 2px solid #e5e7eb;
      border-radius: 8px;
      background: white;
      cursor: pointer;
      font-size: 15px;
      color: #6b7280;
      font-family: inherit;
    }
    .volgende-knop {
      padding: 10px 24px;
      border: none;
      border-radius: 8px;
      background: #1a56db;
      color: white;
      cursor: pointer;
      font-size: 15px;
      font-weight: bold;
      font-family: inherit;
      margin-left: auto;
      transition: background 0.15s;
    }
    .volgende-knop:disabled { background: #e5e7eb; color: #9ca3af; cursor: not-allowed; }
    .verzend-knop {
      padding: 10px 24px;
      border: none;
      border-radius: 8px;
      background: #059669;
      color: white;
      cursor: pointer;
      font-size: 15px;
      font-weight: bold;
      font-family: inherit;
      margin-left: auto;
    }
    .verzend-knop:disabled { background: #9ca3af; cursor: not-allowed; }
    .fout { color: #dc2626; font-size: 13px; margin-bottom: 12px; }
    .dank {
      padding: 40px 24px;
      text-align: center;
    }
    .check-cirkel {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: #d1fae5;
      color: #059669;
      font-size: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
    }
    .dank h2 { font-size: 26px; margin-bottom: 12px; }
    .dank p { color: #6b7280; font-size: 15px; line-height: 1.6; }
    .scherm { display: none; }
    .scherm.actief { display: block; }
  </style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="logo">FRM</div>
    <div>
      <h1>Vragenlijst</h1>
      <p>Fysiotherapie intake</p>
    </div>
  </div>

  <div class="progress" id="progress">
    <div class="progress-stap actief" id="stap-1"></div>
    <div class="progress-stap" id="stap-2"></div>
    <div class="progress-stap" id="stap-3"></div>
  </div>

  <!-- Stap 1 -->
  <div class="scherm actief" id="scherm-1">
    <div class="content">
      <h2>Uw afspraak</h2>
      <p class="info">Vul hieronder uw afspraakgegevens in.</p>

      <label>Bij welke therapeut heeft u een afspraak?</label>
      <div class="knoppen" id="therapeut-knoppen"></div>

      <label>Hoe laat is uw afspraak vandaag?</label>
      <select id="tijdslot">
        <option value="">Kies een tijdstip...</option>
      </select>

      <label>Wat is uw klacht?</label>
      <div class="knoppen" id="klacht-knoppen"></div>
    </div>
    <div class="navigatie">
      <button class="volgende-knop" id="volgende-1" disabled onclick="naarStap(2)">Volgende →</button>
    </div>
  </div>

  <!-- Stap 2 -->
  <div class="scherm" id="scherm-2">
    <div class="content" id="vragenlijst-container"></div>
    <div class="navigatie">
      <button class="terug-knop" onclick="naarStap(1)">← Terug</button>
      <button class="volgende-knop" id="volgende-2" disabled onclick="naarStap(3)">Volgende →</button>
    </div>
  </div>

  <!-- Stap 3 -->
  <div class="scherm" id="scherm-3">
    <div class="content">
      <h2>Controleer uw gegevens</h2>
      <div class="samenvatting" id="samenvatting"></div>
      <p class="fout" id="fout" style="display:none"></p>
      <p class="info">Klopt alles? Klik dan op <strong>Verzenden</strong>.</p>
    </div>
    <div class="navigatie">
      <button class="terug-knop" onclick="naarStap(2)">← Terug</button>
      <button class="verzend-knop" id="verzend-knop" onclick="verzenden()">✓ Verzenden</button>
    </div>
  </div>

  <!-- Dank -->
  <div class="scherm" id="scherm-dank">
    <div class="dank">
      <div class="check-cirkel">✓</div>
      <h2>Bedankt!</h2>
      <p>Uw vragenlijst is succesvol verzonden.<br>U kunt dit venster sluiten.</p>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = "https://uhbmnenyvbyynisdatfo.supabase.co";
const SUPABASE_KEY = "sb_publishable_ht2bdEKr76mI8EDfzXAnkQ_v5AafWWq";

const THERAPEUTEN = ["Rintje", "Tom", "Paul"];
const KLACHTEN = [
  { id: "schouder", label: "Schouderklachten", vragenlijst: "SPADI" },
  { id: "rug", label: "Rugklachten", vragenlijst: "QBPDS" },
];
const SPADI_PIJN = [
  "De pijn op zijn hevigst",
  "Wanneer u op de pijnlijke zijde ligt",
  "Reikend naar iets op een hoge plank",
  "Het aanraken van de achterkant van de nek",
  "Duwen met de pijnlijke arm",
];
const SPADI_BEPERKING = [
  "Uw haar wassen",
  "Uw rug wassen",
  "Een hemd aantrekken",
  "Een shirt met knopen aantrekken",
  "Uw broek aantrekken",
  "Een object op een hoge plank plaatsen",
  "Een zwaar object dragen van 5 kg",
  "Iets pakken uit uw achterzak",
];
const QBPDS_VRAGEN = [
  "Opstaan uit bed","De hele nacht slapen","Omdraaien in bed","Autorijden",
  "20 tot 30 minuten (achter elkaar) staan","Enkele uren in een stoel zitten",
  "Een trap oplopen","Een klein eindje lopen (300-400 m)","Enkele kilometers lopen",
  "Naar een hoge plank reiken","Een bal werpen","Een eindje hardlopen (+/- 100 m)",
  "Iets uit de koelkast pakken","Het bed opmaken","Sokken (of panty) aantrekken",
  "Voorover buigen om bijv. de badkuip of w.c. schoon te maken",
  "Een stoel verplaatsen","Een zware deur opentrekken of open duwen",
  "Dragen van 2 tassen met boodschappen","Een zware koffer optillen en dragen",
];
const QBPDS_LABELS = [
  "Totaal geen moeite","Nauwelijks moeite","Enige moeite",
  "Veel moeite","Zeer veel moeite","Niet in staat",
];

// State
let therapeut = null;
let tijdslot = null;
let klacht = null;
let spadiPijn = new Array(5).fill(null);
let spadiBeperking = new Array(8).fill(null);
let qbpds = new Array(20).fill(null);

// Init tijdsloten
const select = document.getElementById('tijdslot');
for (let i = 0; i <= 24; i++) {
  const uur = Math.floor(i / 2) + 8;
  const min = i % 2 === 0 ? "00" : "30";
  if (uur > 20 || (uur === 20 && min === "30")) continue;
  const opt = document.createElement('option');
  opt.value = `${uur}:${min}`;
  opt.textContent = `${uur}:${min}`;
  select.appendChild(opt);
}
select.addEventListener('change', () => { tijdslot = select.value || null; checkStap1(); });

// Therapeut knoppen
THERAPEUTEN.forEach(naam => {
  const knop = document.createElement('button');
  knop.className = 'optie-knop';
  knop.textContent = naam;
  knop.onclick = () => {
    therapeut = naam;
    document.querySelectorAll('#therapeut-knoppen .optie-knop').forEach(k => k.classList.remove('actief'));
    knop.classList.add('actief');
    checkStap1();
  };
  document.getElementById('therapeut-knoppen').appendChild(knop);
});

// Klacht knoppen
KLACHTEN.forEach(k => {
  const knop = document.createElement('button');
  knop.className = 'optie-knop';
  knop.textContent = k.label;
  knop.onclick = () => {
    klacht = k;
    document.querySelectorAll('#klacht-knoppen .optie-knop').forEach(b => b.classList.remove('actief'));
    knop.classList.add('actief');
    checkStap1();
  };
  document.getElementById('klacht-knoppen').appendChild(knop);
});

function checkStap1() {
  document.getElementById('volgende-1').disabled = !(therapeut && tijdslot && klacht);
}

function naarStap(stap) {
  document.querySelectorAll('.scherm').forEach(s => s.classList.remove('actief'));
  document.getElementById('scherm-' + stap).classList.add('actief');
  document.querySelectorAll('.progress-stap').forEach((s, i) => {
    s.classList.toggle('actief', i < stap);
  });

  if (stap === 2) bouwVragenlijst();
  if (stap === 3) bouwSamenvatting();
}

function bouwVragenlijst() {
  const container = document.getElementById('vragenlijst-container');
  container.innerHTML = '';

  if (klacht.id === 'schouder') {
    container.innerHTML = `
      <h2>SPADI — Schouder vragenlijst</h2>
      <p class="info">Met deze vragenlijst wordt de mate van pijn van uw schouder en de ondervonden beperkingen gedurende de <strong>afgelopen week</strong> in kaart gebracht.</p>
    `;
    const sectie1 = maakSectie('Pijn schaal', 'Hoe erg is uw pijn? <strong>0 = geen pijn</strong> en <strong>10 = ergst bedenkbare pijn</strong>');
    SPADI_PIJN.forEach((v, i) => sectie1.appendChild(maakSlider(v, spadiPijn[i], val => { spadiPijn[i] = val; checkStap2(); })));
    container.appendChild(sectie1);

    const sectie2 = maakSectie('Beperking schaal', 'Hoeveel moeite heeft u? <strong>0 = geen enkele moeite</strong> en <strong>10 = zo moeilijk dat hulp nodig is</strong>');
    SPADI_BEPERKING.forEach((v, i) => sectie2.appendChild(maakSlider(v, spadiBeperking[i], val => { spadiBeperking[i] = val; checkStap2(); })));
    container.appendChild(sectie2);

  } else {
    container.innerHTML = `
      <h2>QBPDS — Rug vragenlijst</h2>
      <p class="info">Onderstaande vragenlijst gaat over de manier waarop uw rugklachten uw dagelijks leven beïnvloeden.</p>
    `;
    QBPDS_VRAGEN.forEach((v, i) => container.appendChild(maakRadio(i + 1, v, qbpds[i], val => { qbpds[i] = val; checkStap2(); })));
  }
  checkStap2();
}

function maakSectie(titel, info) {
  const div = document.createElement('div');
  div.className = 'sectie';
  div.innerHTML = `<div class="sectie-header">${titel}</div><p class="sectie-info">${info}</p>`;
  return div;
}

function maakSlider(label, waarde, onChange) {
  const div = document.createElement('div');
  div.className = 'vraag-blok';
  const waardeEl = document.createElement('div');
  waardeEl.className = 'slider-waarde' + (waarde !== null ? ' ingevuld' : '');
  waardeEl.textContent = waarde !== null ? waarde : '—';

  div.innerHTML = `<div class="vraag-label">${label}</div>`;
  const rij = document.createElement('div');
  rij.className = 'slider-rij';
  rij.innerHTML = '<span class="slider-min">0</span>';

  const slider = document.createElement('input');
  slider.type = 'range';
  slider.min = 0;
  slider.max = 10;
  slider.step = 1;
  slider.value = waarde !== null ? waarde : 5;

  const markeer = (v) => {
    onChange(v);
    waardeEl.className = 'slider-waarde ingevuld';
    waardeEl.textContent = v;
  };
  slider.addEventListener('mousedown', () => markeer(Number(slider.value)));
  slider.addEventListener('touchstart', () => markeer(Number(slider.value)));
  slider.addEventListener('input', () => markeer(Number(slider.value)));

  rij.appendChild(slider);
  rij.innerHTML += '<span class="slider-max">10</span>';
  rij.appendChild(waardeEl);
  div.appendChild(rij);
  return div;
}

function maakRadio(nummer, label, waarde, onChange) {
  const div = document.createElement('div');
  div.className = 'radio-blok';
  div.innerHTML = `<div class="radio-label"><span class="radio-nummer">${nummer}.</span> ${label}</div>`;
  const opties = document.createElement('div');
  opties.className = 'radio-opties';

  QBPDS_LABELS.forEach((tekst, i) => {
    const knop = document.createElement('button');
    knop.className = 'radio-knop' + (waarde === i ? ' actief' : '');
    knop.innerHTML = `<span class="radio-score">${i}</span><span class="radio-tekst">${tekst}</span>`;
    knop.onclick = () => {
      onChange(i);
      opties.querySelectorAll('.radio-knop').forEach(k => k.classList.remove('actief'));
      knop.classList.add('actief');
    };
    opties.appendChild(knop);
  });
  div.appendChild(opties);
  return div;
}

function checkStap2() {
  let klaar = false;
  if (klacht.id === 'schouder') {
    klaar = spadiPijn.every(v => v !== null) && spadiBeperking.every(v => v !== null);
  } else {
    klaar = qbpds.every(v => v !== null);
  }
  document.getElementById('volgende-2').disabled = !klaar;
}

function bouwSamenvatting() {
  const ingevuld = klacht.id === 'schouder'
    ? `${spadiPijn.filter(v => v !== null).length + spadiBeperking.filter(v => v !== null).length}/13`
    : `${qbpds.filter(v => v !== null).length}/20`;

  document.getElementById('samenvatting').innerHTML = [
    ['Therapeut', therapeut],
    ['Tijdstip', tijdslot],
    ['Klacht', klacht.label],
    ['Vragenlijst', klacht.vragenlijst],
    ['Vragen ingevuld', ingevuld],
  ].map(([l, w]) => `
    <div class="samenvatting-rij">
      <span class="samenvatting-label">${l}</span>
      <span class="samenvatting-waarde">${w}</span>
    </div>
  `).join('');
}

async function verzenden() {
  const knop = document.getElementById('verzend-knop');
  const fout = document.getElementById('fout');
  knop.disabled = true;
  knop.textContent = 'Bezig...';
  fout.style.display = 'none';

  const data = {
    therapeut,
    tijdslot,
    klacht: klacht.id,
    vragenlijst: klacht.vragenlijst,
    scores: klacht.id === 'schouder'
      ? { pijn: spadiPijn, beperking: spadiBeperking }
      : { items: qbpds },
  };

  try {
    const response = await fetch(`${SUPABASE_URL}/rest/v1/vragenlijsten`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Prefer': 'return=minimal',
      },
      body: JSON.stringify(data),
    });

    if (!response.ok) throw new Error(await response.text());

    document.querySelectorAll('.scherm').forEach(s => s.classList.remove('actief'));
    document.getElementById('scherm-dank').classList.add('actief');
    document.getElementById('progress').style.display = 'none';

  } catch (e) {
    fout.textContent = 'Er is iets misgegaan. Probeer het opnieuw.';
    fout.style.display = 'block';
    knop.disabled = false;
    knop.textContent = '✓ Verzenden';
  }
}
</script>
</body>
</html>
